<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Role Quiz</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f5ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.quiz-box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:90%;
max-width:500px;
}

h2{
margin-bottom:20px;
}

button{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#5a7cff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3f5ce0;
}
</style>
</head>

<body>

<div class="quiz-box">

<h2 id="question">Loading...</h2>
<div id="answers"></div>

</div>

<script>

const quiz = [
{
q:"When working in a team you usually...",
a:[
["Organize tasks and deadlines","coordinator"],
["Generate creative ideas","innovator"],
["Keep people motivated","motivator"],
["Check details and quality","finisher"]
]
},
{
q:"If the team is stuck you...",
a:[
["Suggest a new approach","innovator"],
["Encourage everyone to keep going","motivator"],
["Structure the work better","coordinator"],
["Review what might be wrong","finisher"]
]
},
{
q:"Your teammates value you because you...",
a:[
["Bring creative thinking","innovator"],
["Keep the team organized","coordinator"],
["Make sure everything is done well","finisher"],
["Boost the team's energy","motivator"]
]
},
{
q:"When a deadline approaches you...",
a:[
["Make sure everyone knows their task","coordinator"],
["Focus on perfecting the details","finisher"],
["Help the team stay positive","motivator"],
["Propose faster solutions","innovator"]
]
},
{
q:"In group discussions you usually...",
a:[
["Bring new ideas","innovator"],
["Guide the conversation","coordinator"],
["Support teammates","motivator"],
["Check practicality","finisher"]
]
}
]

let index=0
let scores={
coordinator:0,
innovator:0,
motivator:0,
finisher:0
}

function loadQuestion(){
const q=quiz[index]
document.getElementById("question").innerText=q.q

const answers=document.getElementById("answers")
answers.innerHTML=""

q.a.forEach(answer=>{
const btn=document.createElement("button")
btn.innerText=answer[0]
btn.onclick=()=>select(answer[1])
answers.appendChild(btn)
})
}

function select(role){
scores[role]++
index++

if(index<quiz.length){
loadQuestion()
}else{
finish()
}
}

function finish(){

let topRole=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b)

const results={
coordinator:"Coordinator — You organize people and keep the team aligned.",
innovator:"Innovator — You bring creative ideas and new perspectives.",
motivator:"Motivator — You energize the team and keep morale high.",
finisher:"Finisher — You ensure quality and attention to detail."
}

document.querySelector(".quiz-box").innerHTML=
"<h2>Your team role:</h2><p>"+results[topRole]+"</p>"
}

loadQuestion()

</script>

</body>
</html>

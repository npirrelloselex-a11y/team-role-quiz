<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Team Role Quiz</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6a8dff,#9ed0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:600px;
background:white;
padding:45px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
}

.progress{
height:8px;
background:#e4e6eb;
border-radius:10px;
margin-bottom:30px;
overflow:hidden;
}

.progress-bar{
height:8px;
background:linear-gradient(90deg,#5a7cff,#7ed4ff);
width:0%;
transition:0.4s;
}

.question{
font-size:22px;
margin-bottom:25px;
}

.options button{
display:block;
width:100%;
margin:12px 0;
padding:16px;
border:none;
border-radius:10px;
background:#eef2ff;
cursor:pointer;
font-size:17px;
transition:0.25s;
}

.options button:hover{
background:#dce4ff;
transform:scale(1.02);
}

.result{
display:none;
}

.role{
font-size:34px;
color:#5a7cff;
margin-top:20px;
font-weight:bold;
}

.description{
font-size:18px;
margin-top:10px;
}

.restart{
margin-top:30px;
padding:12px 22px;
background:#5a7cff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.restart:hover{
background:#4969e0;
}

</style>

</head>

<body>

<div class="container">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="quiz">

<div class="question" id="questionText"></div>

<div class="options" id="options"></div>

</div>

<div class="result" id="result">

<h2>Your Team Role</h2>

<div class="role" id="roleTitle"></div>

<div class="description" id="roleDesc"></div>

<button class="restart" onclick="restartQuiz()">Restart quiz</button>

</div>

</div>

<script>

const questions=[

{
q:"When starting a project you usually...",
options:[
["Suggest creative ideas","creator"],
["Analyze the situation","analyst"],
["Bring people together","connector"],
["Start organizing tasks","driver"]
]
},

{
q:"In meetings you tend to...",
options:[
["Propose new possibilities","creator"],
["Ask critical questions","analyst"],
["Ensure everyone participates","connector"],
["Push the team forward","driver"]
]
]
},

{
q:"When conflict appears...",
options:[
["Think of alternative solutions","creator"],
["Evaluate facts carefully","analyst"],
["Mediate between people","connector"],
["Solve it quickly","driver"]
]
},

{
q:"Your teammates value you because you...",
options:[
["Bring innovation","creator"],
["Bring clarity and logic","analyst"],
["Create a positive atmosphere","connector"],
["Get things done","driver"]
]
},

{
q:"If the team gets stuck you...",
options:[
["Suggest bold new ideas","creator"],
["Analyze what went wrong","analyst"],
["Encourage collaboration","connector"],
["Take action immediately","driver"]
]
}

];

let currentQuestion=0;

let scores={
creator:0,
analyst:0,
connector:0,
driver:0
};

function loadQuestion(){

const q=questions[currentQuestion];

document.getElementById("questionText").innerText=q.q;

const optionsDiv=document.getElementById("options");

optionsDiv.innerHTML="";

q.options.forEach(opt=>{

let btn=document.createElement("button");

btn.innerText=opt[0];

btn.onclick=()=>selectOption(opt[1]);

optionsDiv.appendChild(btn);

});

updateProgress();

}

function selectOption(role){

scores[role]++;

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResult();

}

}

function updateProgress(){

let progress=(currentQuestion/questions.length)*100;

document.getElementById("progressBar").style.width=progress+"%";

}

function showResult(){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

let role=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

const descriptions={

creator:["Creator","You bring innovation and fresh ideas to the team."],

analyst:["Analyst","You evaluate options carefully and think strategically."],

connector:["Connector","You strengthen collaboration and relationships."],

driver:["Driver","You push the team to act and achieve results."]

};

document.getElementById("roleTitle").innerText=descriptions[role][0];

document.getElementById("roleDesc").innerText=descriptions[role][1];

}

function restartQuiz(){

currentQuestion=0;

scores={creator:0,analyst:0,connector:0,driver:0};

document.getElementById("result").style.display="none";

document.getElementById("quiz").style.display="block";

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
